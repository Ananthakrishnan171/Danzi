    <h3>Dance School Admission Form</h3>

    <h2>Admission Form</h2>

    <form action="#" method="post">

        <label>Full Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Age:</label><br>
        <input type="number" name="age" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>

        <label>Mobile Number:</label><br>
        <input type="tel" name="mobile" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30"></textarea><br><br>

        <label>Select Course:</label><br>
        <select name="course">
            <option>Western Dance</option>
            <option>Classical Dance</option>
            <option>Bharatanatyam</option>
            <option>Hip Hop</option>
        </select><br><br>

        <label>Batch:</label><br>
        <select name="batch">
            <option>Morning</option>
            <option>Evening</option>
            <option>Weekend</option>
        </select><br><br>

        <label>Upload Photo:</label><br>
        <input type="file" name="photo"><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Clear">

    </form>
