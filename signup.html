<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Danzi Dance Club account and start your dance journey.">
    <title>Sign Up – Danzi Dance Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">DANZI</div>
            <h2>Create Account</h2>

            <form action="login.html" id="signupForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Sign Up →</button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
